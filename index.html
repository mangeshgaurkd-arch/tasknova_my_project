<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskNova</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Logo + Name -->
  <div class="header">
    <img src="img/logo.png" alt="TaskNova Logo" height="100px" width="100px">
    <h1>TaskNova</h1>
  </div>

  <!-- Input -->
  <div class="input-section">
    <input type="text" id="taskInput" placeholder="Enter your task">
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>

  <!-- Search -->
  <input type="text" id="search" placeholder="Search task" onkeyup="searchTask()">

  <!-- Task List -->
  <ul id="taskList"></ul>

  <!-- Stats -->
  <div class="stats">
    Total: <span id="total">0</span> |
    Completed: <span id="completed">0</span>
  </div>

  <button onclick="toggleDarkMode()">🌙 Dark Mode</button>

</div>

<script src="script.js"></script>
</body>
</html>
